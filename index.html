<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEDAorder - Warung Anda Jadi Digital!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- PANGGIL CONFIG LANDING PAGE DI SINI -->
    <script src="config_landingpage.js"></script>
</head>
<body>

    <!-- Header, Hero, Fitur tetap sama -->
    ...

    <!-- SECTION PENDAFTARAN MITRA WARUNG -->
    <section id="daftar" class="daftar">
        <div class="container">
            <div class="daftar-container">
                <div class="form-text">
                    <h3>Daftar Mitra Warung BEDAorder</h3>
                    <p>Dapatkan uji coba <b>GRATIS 14 hari</b> tanpa biaya awal. Mulai digitalisasi bisnis kuliner Anda sekarang!</p>
                </div>

                <form class="daftar-form" id="form-registrasi" onsubmit="prosesPendaftaran(event)">
                    <div>
                        <label style="font-size: 12px; font-weight: 600; color: #555;">Nama Pemilik Warung</label>
                        <input type="text" id="reg-owner" placeholder="Contoh: Budi Santoso" required>
                    </div>

                    <div>
                        <label style="font-size: 12px; font-weight: 600; color: #555;">Nama Warung / Usaha</label>
                        <input type="text" id="reg-shop-name" placeholder="Contoh: Warung Makan Barokah" oninput="generateSlug(this.value)" required>
                    </div>

                    <div>
                        <label style="font-size: 12px; font-weight: 600; color: #555;">URL / Link Toko Anda</label>
                        <input type="text" id="reg-slug" placeholder="warung-makan-barokah" style="background-color: #f3f4f6; font-family: monospace;" readonly required>
                        <small style="font-size: 11px; color: #888; display: block; margin-top: 4px; margin-bottom: 10px;">
                            Link toko Anda: <i>bedaorder.com/?shop=<span id="preview-slug">...</span></i>
                        </small>
                    </div>

                    <div>
                        <label style="font-size: 12px; font-weight: 600; color: #555;">Username (Untuk Login Admin Toko)</label>
                        <input type="text" id="reg-username" placeholder="Contoh: budibarokah" required>
                    </div>

                    <div>
                        <label style="font-size: 12px; font-weight: 600; color: #555;">Password Login</label>
                        <input type="password" id="reg-password" placeholder="Bikin password akun Anda" required>
                    </div>

                    <button type="submit" id="btn-submit-reg" class="btn-primary btn-block">
                        🎁 MULAI UJI COBA GRATIS 14 HARI
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- SCRIPT HANDLER -->
    <script>
        function generateSlug(text) {
            const slug = text.toLowerCase()
                .trim()
                .replace(/[^\w\s-]/g, '')
                .replace(/[\s_-]+/g, '-')
                .replace(/^-+|-+$/g, '');

            document.getElementById('reg-slug').value = slug;
            document.getElementById('preview-slug').innerText = slug || '...';
        }

        function prosesPendaftaran(event) {
            event.preventDefault();

            const btnSubmit = document.getElementById('btn-submit-reg');
            const ownerName = document.getElementById('reg-owner').value.trim();
            const shopName = document.getElementById('reg-shop-name').value.trim();
            const slug = document.getElementById('reg-slug').value.trim();
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;

            btnSubmit.disabled = true;
            btnSubmit.innerText = "⏳ Sedang Memproses Akun Anda...";

            const payload = {
                owner_name: ownerName,
                shop_name: shopName,
                slug: slug,
                username: username,
                password: password
            };

            // Menggunakan API_URL dari config_landingpage.js
            fetch(`${API_URL}/api/register`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert(`🎉 Pendaftaran Berhasil!\n\nSelamat datang di BEDAorder! Toko Anda telah aktif dengan akses Trial 14 Hari hingga tanggal ${data.subscription_until}.\n\nSilakan login ke dashboard admin warung Anda.`);
                    document.getElementById('form-registrasi').reset();
                    document.getElementById('preview-slug').innerText = '...';
                    window.location.href = "/admin/login.html"; 
                } else {
                    alert(`⚠️ Gagal Mendaftar: ${data.message}`);
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = "🎁 MULAI UJI COBA GRATIS 14 HARI";
                }
            })
            .catch(err => {
                console.error("Error Registrasi:", err);
                alert("Terjadi kesalahan koneksi ke server database.");
                btnSubmit.disabled = false;
                btnSubmit.innerText = "🎁 MULAI UJI COBA GRATIS 14 HARI";
            });
        }
    </script>
</body>
</html>
